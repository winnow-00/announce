@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --field:#1f5c3d; --field2:#2b7a4f; --clay:#c68a5b;
  --paper:#eef0ea; --card:#ffffff; --ink:#20242a; --sub:#6a7078;
  --line:#dcdbd2; --stitch:#c63a2f; --chalk:#f4f2e9;
}
*{box-sizing:border-box;}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);
  font-family:'Noto Sans JP',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
.top{position:sticky;top:0;z-index:5;background:var(--field);color:var(--chalk);
  padding:14px 16px 12px;box-shadow:0 2px 10px rgba(0,0,0,.18);}
.brand{display:flex;align-items:center;gap:8px;font-family:'Oswald';font-weight:600;font-size:19px;}
.seg{display:flex;gap:6px;margin-top:12px;background:rgba(0,0,0,.22);padding:4px;border-radius:11px;}
.seg button{flex:1;border:0;background:transparent;color:#cfe4d6;padding:9px;border-radius:8px;
  font-family:'Oswald';font-weight:600;font-size:15px;cursor:pointer;}
.seg button.on{background:var(--chalk);color:var(--field);}
.body{padding:14px 14px 40px;display:flex;flex-direction:column;gap:12px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.04);}
.cap{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.06em;color:var(--field);
  margin-bottom:10px;border-left:3px solid var(--stitch);padding-left:8px;}
.lbl{display:block;font-size:12px;color:var(--sub);font-weight:700;margin:10px 0 5px;}
.hint{font-size:12px;color:var(--sub);margin:8px 2px 0;line-height:1.6;}
.empty{font-size:13px;color:var(--sub);margin:2px 2px 10px;line-height:1.6;}
.save-note{font-size:11px;color:var(--sub);text-align:center;margin:2px 0 0;}
.in{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:15px;
  background:#fbfbf8;color:var(--ink);font-family:inherit;}
.in:focus{outline:none;border-color:var(--field2);box-shadow:0 0 0 3px rgba(43,122,79,.15);}
select.in{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--sub) 50%),linear-gradient(135deg,var(--sub) 50%,transparent 50%);
  background-position:calc(100% - 16px) 18px,calc(100% - 11px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:30px;}
.prow{display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-top:1px dashed var(--line);}
.prow:first-of-type{border-top:0;}
.ordbadge-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:2px;}
.ordcap{font-size:9px;font-weight:700;color:var(--sub);}
.ordbadge{width:34px;height:34px;border-radius:50%;background:var(--field);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:17px;}
.ordbadge.sub{background:var(--clay);font-size:12px;font-family:'Noto Sans JP';font-weight:700;}
.pfields{flex:1;display:flex;flex-direction:column;gap:7px;}
.line1{display:flex;gap:6px;}
.in.name{flex:1;min-width:0;}
.seatwrap{flex:1;min-width:0;display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fbfbf8;}
.seatlabel{flex:0 0 auto;font-size:10px;font-weight:700;color:#fff;background:var(--field);padding:0 8px;align-self:stretch;display:flex;align-items:center;}
.seatwrap .in.sel{flex:1;min-width:0;border:0;border-radius:0;font-size:15px;font-weight:700;background:transparent;}
.seatwrap .in.sel:focus{box-shadow:none;}
.numwrap{flex:0 0 auto;display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fbfbf8;}
.numlabel{font-size:10px;font-weight:700;color:#fff;background:var(--sub);padding:0 6px;align-self:stretch;display:flex;align-items:center;white-space:nowrap;}
.numwrap .in.num{flex:0 0 36px;width:36px;border:0;border-radius:0;text-align:center;padding:9px 2px;font-size:14px;}
.numwrap .in.num:focus{box-shadow:none;}
.in.half{flex:1;}
.del{flex:0 0 auto;width:38px;border:1px solid var(--line);background:#faf7f6;color:var(--stitch);
  border-radius:9px;font-size:14px;cursor:pointer;}
.guide{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.guidehead{width:100%;display:flex;justify-content:space-between;align-items:center;
  background:var(--field);color:var(--chalk);border:0;padding:11px 14px;font-family:inherit;
  font-weight:700;font-size:14px;cursor:pointer;}
.gtoggle{font-size:12px;font-weight:600;opacity:.9;}
.guidebody{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.guidebody p{margin:0;font-size:13px;line-height:1.65;color:var(--ink);}
.guidebody b{color:var(--field);}
.guidebody u{text-decoration-color:var(--stitch);text-underline-offset:2px;}
.gnote{color:var(--sub);border-top:1px dashed var(--line);padding-top:8px;}
.seg5{display:flex;flex-wrap:wrap;gap:5px;background:#e2e4dd;padding:4px;border-radius:11px;}
.seg5 button{flex:1 1 30%;border:0;background:transparent;color:var(--sub);padding:9px 2px;border-radius:8px;
  font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.seg5 button.on{background:#fff;color:var(--field);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.field{position:relative;width:100%;padding-bottom:100%;border-radius:12px;overflow:hidden;
  background:radial-gradient(circle at 50% 78%,var(--field2),var(--field) 70%);border:2px solid #17492f;}
.infield{position:absolute;width:52%;height:52%;left:24%;top:44%;background:var(--clay);
  transform:rotate(45deg);border-radius:8px;box-shadow:inset 0 0 0 3px rgba(255,255,255,.25);}
.chip{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;
  gap:2px;background:#fff;border:2px solid transparent;border-radius:10px;padding:4px 6px;min-width:52px;
  cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.28);}
.chip.sel{border-color:var(--stitch);box-shadow:0 0 0 3px rgba(198,58,47,.35);}
.chip.used{opacity:.55;}
.chipnum{font-family:'Oswald';font-weight:700;font-size:15px;line-height:1;color:var(--field);
  background:#e8eee9;border-radius:5px;padding:1px 6px;}
.chipname{font-size:11px;font-weight:700;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.draftbox{margin-top:12px;border:1px dashed var(--stitch);border-radius:10px;padding:10px;background:#fdf7f6;}
.draftline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.cnode{display:inline-flex;flex-direction:column;align-items:center;min-width:34px;padding:3px 0;
  background:var(--field);color:#fff;border-radius:8px;font-family:'Oswald';font-weight:700;font-size:16px;line-height:1;}
.cnode small{font-family:'Noto Sans JP';font-weight:700;font-size:9px;opacity:.8;margin-top:1px;}
.arrow{color:var(--clay);font-weight:700;}
.subword{font-size:13px;}
.draftctrl{display:flex;flex-direction:column;gap:8px;}
.subtoggle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.subtoggle input{width:18px;height:18px;}
.errbar{display:flex;align-items:flex-start;gap:8px;margin-top:12px;background:#fdecea;border:1px solid #f2b8b1;border-radius:10px;padding:10px 12px;color:#a82e25;font-size:13px;font-weight:700;line-height:1.55;}
.erricon{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--stitch);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;}
.steplist{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:6px;}
.steprow{display:flex;align-items:center;gap:8px;background:#f6f7f2;border-radius:8px;padding:7px 8px;}
.stepno{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--stitch);color:#fff;
  font-family:'Oswald';font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;}
.steptxt{flex:1;font-size:14px;font-weight:500;}
.stepsub{margin-left:6px;font-style:normal;font-size:11px;color:#fff;background:var(--clay);border-radius:5px;padding:1px 5px;}
.chainbtns{display:flex;gap:8px;margin-top:6px;}
.chainbtns .btn:first-child{flex:1;}
.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
.btn.primary{background:var(--stitch);color:#fff;box-shadow:0 2px 6px rgba(198,58,47,.3);}
.btn.primary:disabled{background:#d7b3af;box-shadow:none;cursor:not-allowed;}
.btn.ghost{background:#eceee7;color:var(--ink);}
.btn.danger{background:#fff;color:var(--stitch);border:1px solid var(--stitch);}
.btn.full{width:100%;}
.form .btn.full{margin-top:14px;}
.script-card{border-color:var(--field2);box-shadow:0 3px 12px rgba(31,92,61,.14);}
.script{width:100%;border:1px dashed var(--field2);border-radius:10px;padding:12px;font-size:16px;
  line-height:1.7;background:#f7faf6;color:var(--ink);font-family:inherit;resize:vertical;}
.scriptbtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.scriptbtns .btn{flex:1;min-width:90px;}
.lineup-mini .cap{margin-bottom:8px;}
.minirow{display:flex;align-items:center;gap:8px;padding:6px 2px;border-top:1px solid #f0efe8;font-size:14px;}
.minirow:first-of-type{border-top:0;}
.mord{font-family:'Oswald';font-weight:700;width:20px;color:var(--field);}
.mpos{width:22px;text-align:center;font-weight:700;color:var(--clay);}
.mname{flex:1;font-weight:500;}
.mflags{display:flex;gap:4px;}
.flag{font-style:normal;font-size:10px;font-weight:700;color:#fff;background:var(--field2);border-radius:5px;padding:1px 5px;}
.flag.warn{background:var(--stitch);}
.mnum{color:var(--sub);font-size:12px;font-family:'Oswald';}
.outsec{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px;}
.outcap{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:5px;}
.outname{display:inline-block;font-size:12px;color:var(--sub);background:#f0efe8;border-radius:6px;
  padding:2px 8px;margin:0 4px 4px 0;text-decoration:line-through;}
.batterrow{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:1px solid var(--line);
  background:#fbfbf8;border-radius:9px;padding:10px;margin-bottom:6px;cursor:pointer;font-family:inherit;font-size:14px;}
.batterrow:active{background:#f0f2ec;}
@media (prefers-reduced-motion: reduce){*{transition:none!important;}}
